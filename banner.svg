<svg width="100%" viewBox="0 0 680 180" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Spectral aliasing animation</title>
  <desc>A high-frequency signal being undersampled, producing a visible alias</desc>

  <style>
    .label { font-family: monospace; font-size: 11px; fill: #888; }
    .warn  { font-family: monospace; font-size: 11px; fill: #D85A30; }
    .title { font-family: monospace; font-size: 13px; font-weight: 600; fill: #222; }

    .signal-path {
      fill: none;
      stroke: #378ADD;
      stroke-width: 1.5;
      stroke-dasharray: 900;
      stroke-dashoffset: 900;
      animation: draw 2s ease forwards;
    }
    .alias-path {
      fill: none;
      stroke: #D85A30;
      stroke-width: 1.8;
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
      opacity: 0;
      animation: draw-alias 1.5s ease 2.8s forwards;
    }
    .sample-dot {
      fill: #378ADD;
      opacity: 0;
    }
    .warn-text {
      opacity: 0;
      animation: fadein 0.6s ease 4.5s forwards;
    }
    .fs-label {
      opacity: 0;
      animation: fadein 0.5s ease 2.4s forwards;
    }
    .alias-label {
      opacity: 0;
      animation: fadein 0.5s ease 4.2s forwards;
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes draw-alias {
      0%  { stroke-dashoffset: 600; opacity: 1; }
      100%{ stroke-dashoffset: 0;   opacity: 1; }
    }
    @keyframes fadein {
      to { opacity: 1; }
    }

    .d1 { animation-delay: 1.8s; }
    .d2 { animation-delay: 2.0s; }
    .d3 { animation-delay: 2.2s; }
    .d4 { animation-delay: 2.4s; }
    .d5 { animation-delay: 2.6s; }

    .dot-pop {
      animation: pop 0.25s ease forwards;
      opacity: 0;
    }
    @keyframes pop {
      0%   { opacity: 0; r: 2; }
      60%  { opacity: 1; r: 5; }
      100% { opacity: 1; r: 3.5; }
    }
  </style>

  <text x="40" y="28" class="title">sampling below nyquist</text>

  <text x="40" y="52" class="label">original  </text>
  <line x1="107" y1="48" x2="130" y2="48" stroke="#378ADD" stroke-width="1.5"/>
  <text x="150" y="52" class="label">alias  </text>
  <line x1="183" y1="48" x2="206" y2="48" stroke="#D85A30" stroke-width="1.8"/>

  <path class="signal-path" d="
    M40,110
    C52,110 54,70 66,70 C78,70 80,150 92,150 C104,150 106,70 118,70
    C130,70 132,150 144,150 C156,150 158,70 170,70
    C182,70 184,150 196,150 C208,150 210,70 222,70
    C234,70 236,150 248,150 C260,150 262,70 274,70
    C286,70 288,150 300,150 C312,150 314,70 326,70
    C338,70 340,150 352,150 C364,150 366,70 378,70
    C390,70 392,150 404,150 C416,150 418,70 430,70
    C442,70 444,150 456,150 C468,150 470,70 482,70
    C494,70 496,150 508,150 C520,150 522,70 534,70
    C546,70 548,150 560,150 C572,150 574,70 586,70
    C598,70 600,150 612,150 C624,150 626,110 638,110
  "/>

  <circle class="sample-dot dot-pop d1" cx="92"  cy="150" r="3.5"/>
  <circle class="sample-dot dot-pop d2" cx="196" cy="150" r="3.5"/>
  <circle class="sample-dot dot-pop d3" cx="300" cy="150" r="3.5"/>
  <circle class="sample-dot dot-pop d4" cx="404" cy="150" r="3.5"/>
  <circle class="sample-dot dot-pop d5" cx="508" cy="150" r="3.5"/>

  <text x="40" y="172" class="label fs-label">Fs &lt; 2·Fmax</text>

  <path class="alias-path" d="
    M92,150 C144,150 248,70 300,110 C352,150 456,150 508,150
  "/>

  <text x="380" y="100" class="warn alias-label">perceived alias</text>

  <text x="460" y="172" class="warn warn-text">⚠ aliasing detected</text>
</svg>
